name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 核心步驟：自動將過時的 jcenter() 替換為支援更好的鏡像，避免下載失敗
      - name: Fix deprecated repositories
        run: |
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' build.gradle
          if [ -f app/build.gradle ]; then
            sed -i 's/jcenter()/google()\n        mavenCentral()/g' app/build.gradle
          fi

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProcessManager-Debug-APK
          path: app/build/outputs/apk/**/*.apk
