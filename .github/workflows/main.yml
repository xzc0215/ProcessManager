name: Build Legacy Android Project

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-20.04  # 使用較舊的鏡像以獲得更好的舊版相容性

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 確保 :hidden-api-stub 子模組被拉取

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Android Build Tools 21.1.0
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;21.1.0" "platforms;android-21"

      # 關鍵：不修改源碼，但透過 Gradle 參數強制跳過 JCenter 錯誤並指向鏡像
      - name: Build with Gradle Wrapper
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.useAndroidX=false \
            -Pandroid.enableJetifier=false \
            --info
        env:
          # 透過環境變數嘗試引導舊版 Gradle 尋找依賴（如果 gradlew 存在）
          TERM: dumb

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProcessManager-Legacy-APK
          path: "**/build/outputs/apk/*.apk"
